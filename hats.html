<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎩</text></svg>" />
    <title>6 Thinking Hats – BerkAI Game Hub</title>
    <meta name="description" content="De Bono's 6 Thinking Hats classroom activity for ELT. AI-generated discussion prompts for critical thinking." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="hats.css" />
</head>

<body>
    <canvas id="particles"></canvas>

    <!-- ============ SETUP SCREEN ============ -->
    <div id="screen-setup" class="screen active">
        <div class="glass-card">
            <div class="logo-area">
                <span class="logo-icon">🎩</span>
                <h1>6 Thinking Hats</h1>
                <p class="tagline">De Bono's critical thinking for ELT classrooms</p>
            </div>

            <div class="setup-form">
                <div class="form-group">
                    <label class="form-label" for="topic-input">Discussion Topic</label>
                    <input id="topic-input" class="theme-input" type="text"
                        placeholder="e.g. Social Media, Climate Change, Space Travel…" maxlength="100" />
                </div>

                <div class="form-group">
                    <label class="form-label" for="cefr-select">CEFR Level</label>
                    <select id="cefr-select" class="cefr-select">
                        <option value="">Auto (mixed levels)</option>
                        <option value="A1">A1 – Beginner</option>
                        <option value="A2">A2 – Elementary</option>
                        <option value="B1">B1 – Intermediate</option>
                        <option value="B1+">B1+ – Upper Intermediate</option>
                        <option value="B2">B2 – Advanced</option>
                        <option value="C1">C1 – Proficient</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Discussion Timer</label>
                    <div class="timer-config">
                        <input id="timer-input" class="timer-input" type="number" min="1" max="15" value="5" />
                        <span class="timer-unit">minutes per round</span>
                    </div>
                </div>
            </div>

            <button id="btn-generate" class="btn-primary">
                <span class="btn-text">🎩 Generate Hats</span>
            </button>

            <!-- Loading state (hidden by default) -->
            <div id="loading-area" class="loading-area" style="display:none;">
                <div class="spinner"></div>
                <span class="loading-text">Generating discussion prompts…</span>
            </div>

            <div class="divider"><span>or</span></div>
            <a href="index.html" class="btn-secondary" style="text-decoration:none;">🏠 Main Menu</a>
        </div>
    </div>

    <!-- ============ BOARD SCREEN ============ -->
    <div id="screen-board" class="board-screen">
        <!-- Header bar -->
        <div class="board-header">
            <div class="board-topic">
                <span>🎩</span>
                <span class="board-topic-text" id="board-topic-text">Topic</span>
                <span class="board-cefr-badge" id="board-cefr-badge"></span>
            </div>

            <div class="board-controls">
                <!-- Timer -->
                <div class="timer-display">
                    <button class="timer-btn" id="btn-timer-toggle" title="Start/Pause">▶</button>
                    <span class="timer-time" id="timer-time">05:00</span>
                    <button class="timer-btn" id="btn-timer-reset" title="Reset">↺</button>
                </div>

                <button class="btn-icon" id="btn-reveal-all" title="Reveal all cards">👁 Reveal All</button>
                <button class="btn-icon" id="btn-shuffle" title="Shuffle hat order">🔀 Shuffle</button>
                <button class="btn-icon" id="btn-new-topic" title="New topic">✨ New Topic</button>
            </div>
        </div>

        <!-- Hat Cards Grid -->
        <div class="hats-grid" id="hats-grid">
            <!-- Cards injected by JS -->
        </div>
    </div>

    <script src="hats.js"></script>
</body>

</html>
