<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
    <title>BerkAI Game Hub</title>
    <meta name="description" content="BerkAI Game Hub - Who Am I, Taboo, Hangman, Word Game and more party games." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="hub.css" />
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
</head>

<body>
    <canvas id="particles"></canvas>

    <div class="hub-container">
        <header class="hub-header">
            <span class="hub-icon emoji">🎮</span>
            <h1>BerkAI Game Hub</h1>
            <p class="hub-tagline">Hand-crafted interactive games for classrooms & groups</p>
        </header>

        <div class="category-tabs">
            <button class="cat-tab active" data-filter="all"><span class="tab-emoji emoji">🎮</span> All Games</button>
            <button class="cat-tab" data-filter="solo"><span class="tab-emoji emoji">👤</span> Solo Games</button>
            <button class="cat-tab" data-filter="multi"><span class="tab-emoji emoji">👥</span> Multiplayer</button>
        </div>

        <div class="game-grid">
            <a href="lingoparty.html" class="game-card badge-card" id="card-lingoparty" data-category="multi">
                <span class="card-badge">NEW ✨</span>
                <div class="emoji-wrapper"><span class="game-emoji emoji">🎲</span></div>
                <h2>LingoParty</h2>
            </a>

            <a href="who.html" class="game-card" id="card-who" data-category="multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🎭</span></div>
                <h2>Who Am I?</h2>
            </a>

            <a href="taboo.html" class="game-card" id="card-taboo" data-category="multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🃏</span></div>
                <h2>Taboo</h2>
            </a>

            <a href="hangman.html" class="game-card" id="card-hangman" data-category="solo multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">💀</span></div>
                <h2>Hangman</h2>
            </a>

            <a href="bottle.html" class="game-card" id="card-bottle" data-category="multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🍾</span></div>
                <h2>Spin the Bottle</h2>
            </a>

            <a href="wheel.html" class="game-card" id="card-wheel" data-category="multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🎡</span></div>
                <h2>Wheel of Names</h2>
            </a>

            <a href="kelime.html" class="game-card" id="card-kelime" data-category="solo multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🔤</span></div>
                <h2>Word Game</h2>
            </a>

            <a href="flashcards.html" class="game-card" id="card-flashcards" data-category="solo multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">📇</span></div>
                <h2>Flashcards</h2>
            </a>

            <a href="millionaire.html" class="game-card" id="card-millionaire" data-category="solo multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">💰</span></div>
                <h2>Millionaire</h2>
            </a>

            <a href="hats.html" class="game-card" id="card-hats" data-category="solo multi">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🎩</span></div>
                <h2>6 Thinking Hats</h2>
            </a>

            <a href="FlappyCrocodile/index.html" class="game-card" id="card-flappy" data-category="solo">
                <div class="emoji-wrapper"><span class="game-emoji emoji">🐊</span></div>
                <h2>Flappy Crocodile</h2>
            </a>
        </div>
    </div>

    <script src="particles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabs = document.querySelectorAll('.cat-tab');
            const cards = document.querySelectorAll('.game-card');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const filter = tab.getAttribute('data-filter');

                    cards.forEach(card => {
                        const categories = (card.getAttribute('data-category') || '').split(' ');
                        if (filter === 'all' || categories.includes(filter)) {
                            card.classList.remove('hidden');
                        } else {
                            card.classList.add('hidden');
                        }
                    });
                });
            });
        });
    </script>
</body>

</html>
