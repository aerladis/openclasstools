<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Game - English Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kelime.css">
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
</head>

<body>
    <canvas id="particles"></canvas>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="wordgame-stage">
        <section class="board-surface glass-panel">
            <div class="question-wrap">
                <p id="question-text" class="question-text">Word Game is ready.</p>
            </div>

            <div class="letters-wrap">
                <div id="letters-container" class="letters-container"></div>
            </div>

            <div class="stats-row">
                <div class="stat-card glass-panel">
                    <span class="stat-label">Time</span>
                    <span id="timer-display" class="stat-value timer">04:00</span>
                </div>
                <div class="stat-card glass-panel">
                    <span class="stat-label">Score</span>
                    <span id="score-display" class="stat-value score">0</span>
                </div>
            </div>

            <p id="waiting-msg" class="status-banner glass-panel">Ready for Solo Play! Enter a topic and generate with AI, or click Play Default to start.</p>

            <div class="solo-controls glass-panel">
                <div class="solo-top-row">
                    <input type="text" id="theme-input" class="theme-input" placeholder="AI Topic (e.g. Science, Cinema, Space)..." />
                    <button id="btn-generate-ai" class="btn-primary"><span class="btn-icon">✨</span> AI Generate</button>
                    <button id="btn-use-default" class="btn-secondary"><span class="btn-icon">▶️</span> Play / Start</button>
                </div>
                <div class="solo-action-bar">
                    <button id="btn-reveal-letter" class="action-btn btn-reveal" title="Reveal 1 random letter (-100 pts)">💡 Harf Al</button>
                    <button id="btn-correct-answer" class="action-btn btn-correct" title="Mark correct & get points">✅ Doğru</button>
                    <button id="btn-pass-question" class="action-btn btn-pass" title="Pass question without points">⏭️ Pas</button>
                    <button id="btn-toggle-timer" class="action-btn btn-timer" title="Pause / Resume Timer">⏸️ Süre</button>
                    <button id="btn-prev-question" class="action-btn btn-nav" title="Previous Question">⬅️ Önceki</button>
                    <button id="btn-next-question" class="action-btn btn-nav" title="Next Question">Sıradaki ➡️</button>
                </div>
            </div>

            <div id="round-result-overlay" class="round-result-overlay" hidden>
                <div class="round-result-card glass-panel">
                    <p id="round-result-kicker" class="round-result-kicker">Round Complete</p>
                    <h2 id="round-result-title" class="round-result-title">Finished</h2>
                    <p id="round-result-message" class="round-result-message">The round is over.</p>
                    <p class="round-result-score-label">Final Score</p>
                    <p id="round-result-score" class="round-result-score">0</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="particles.js"></script>
    <script src="kelime.js"></script>
</body>

</html>
