<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BerkAI Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div class="admin-container">
        <!-- Compact Header -->
        <header class="admin-header">
            <h1>Admin Panel</h1>
            <div id="connection-bar" class="connection-bar">
                <span id="connection-status" class="status-dot disconnected"></span>
                <span id="connection-text">Disconnected</span>
                <span id="connected-game-id" class="game-id"></span>
            </div>
        </header>

        <!-- Login Screen -->
        <div id="login-card" class="card">
            <h2>Connect to Game</h2>
            <p class="hint">Enter the 4-digit Game ID from the smartboard</p>
            <div class="input-row">
                <input type="text" id="game-id-input" placeholder="A7B2" maxlength="4" />
                <button id="btn-connect" class="btn-primary">Connect</button>
            </div>
            <p id="connect-error" class="error-msg"></p>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-setup" class="hidden">
            <!-- Game Info Card -->
            <div id="game-card" class="card">
                <div class="game-header-row">
                    <h2 id="game-name">None</h2>
                    <button id="btn-disconnect" class="btn-text">Disconnect</button>
                </div>

                <!-- Millionaire Admin Controls -->
                <div id="millionaire-data" class="game-data hidden">
                    <div class="info-row">
                        <span>Level: <strong id="millionaire-level">-</strong></span>
                        <span>Prize: <strong id="millionaire-prize">-</strong></span>
                    </div>
                    <div class="question-box">
                        <p id="millionaire-question" class="question-text">-</p>
                        <div id="millionaire-options" class="options-list"></div>
                    </div>
                    <div class="lifeline-controls">
                        <button id="btn-5050" class="lifeline-btn">50:50</button>
                        <button id="btn-phone" class="lifeline-btn">Phone</button>
                        <button id="btn-audience" class="lifeline-btn">Audience</button>
                    </div>
                    <div class="timer-row">
                        <span id="millionaire-timer">30s</span>
                        <button id="btn-timer-toggle" class="btn-secondary">Start/Stop</button>
                    </div>
                </div>

                <!-- Word Game Controls -->
                <div id="kelime-data" class="game-data hidden">
                    <div class="control-grid" style="margin-bottom: 10px;">
                        <button id="btn-kelime-start" class="btn-success">Start Game</button>
                    </div>
                    <div class="nav-row">
                        <button id="btn-kelime-prev" class="btn-icon">Prev</button>
                        <span id="kelime-counter" class="counter">0 / 0</span>
                        <button id="btn-kelime-next" class="btn-icon">Next</button>
                    </div>
                    <div class="question-box">
                        <p id="kelime-question" class="question-text">-</p>
                        <p id="kelime-answer" class="answer-text">-</p>
                    </div>
                    <div class="control-grid">
                        <button id="btn-kelime-reveal" class="btn-accent">Reveal Letter</button>
                        <button id="btn-kelime-timer" class="btn-secondary">Timer</button>
                        <button id="btn-kelime-correct" class="btn-success">Correct</button>
                        <button id="btn-kelime-pass" class="btn-danger">Pass</button>
                    </div>
                    <div class="status-row">
                        <span id="kelime-status">Waiting</span>
                        <span>Score: <strong id="kelime-potential">0</strong></span>
                    </div>
                </div>

                <!-- Hangman Controls -->
                <div id="hangman-data" class="game-data hidden">
                    <div class="word-display">
                        <span id="hangman-word" class="highlight">---</span>
                    </div>
                    <div class="info-row">
                        <span>Category: <span id="hangman-category">-</span></span>
                        <span>Wrong: <span id="hangman-wrong">0</span>/6</span>
                    </div>
                    <div id="hangman-state"></div>
                </div>

                <!-- Taboo Controls -->
                <div id="taboo-data" class="game-data hidden">
                    <div class="word-box">
                        <h3 id="taboo-word" class="main-word">-</h3>
                        <div id="taboo-forbidden" class="forbidden-list"></div>
                    </div>
                    <div class="info-row">
                        <span>Team: <span id="taboo-team">-</span></span>
                        <span>Time: <span id="taboo-time">0</span>s</span>
                    </div>
                </div>

                <!-- Who Am I Controls -->
                <div id="whoami-data" class="game-data hidden">
                    <div class="character-display">
                        <span id="whoami-character" class="highlight">---</span>
                    </div>
                    <p class="hint">Character is visible on screen</p>
                </div>

                <div id="waiting-message" class="waiting">
                    <p>Waiting for game to start...</p>
                </div>
            </div>

            <!-- Word Management -->
            <div id="word-manager-card" class="card hidden">
                <div class="section-header">
                    <h3>Word Management</h3>
                    <div class="button-group">
                        <button id="btn-add-word" class="btn-primary">+ Add</button>
                        <button id="btn-save-words" class="btn-success">Save</button>
                    </div>
                </div>
                <div id="word-list-container" class="word-list">
                    <p class="empty">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="admin.js"></script>
</body>

</html>
