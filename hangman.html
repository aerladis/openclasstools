<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>" />
    <title>Hangman – BerkAI Game Hub</title>
    <meta name="description" content="Classic Hangman word guessing game with AI-generated words." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="hangman.css" />
</head>

<body>
    <canvas id="particles"></canvas>

    <!-- ===== START SCREEN ===== -->
    <div id="screen-start" class="screen active">
        <div class="glass-card start-card">
            <div class="logo-area">
                <span class="logo-icon">💀</span>
                <h1>Hangman</h1>
                <p class="tagline">Guess the word before it's too late!</p>
            </div>

            <button id="btn-play" class="btn-primary pulse">
                <span class="btn-text">Play</span>
                <span class="btn-arrow">→</span>
            </button>

            <div class="divider"><span>or</span></div>

            <div class="generate-section">
                <div style="display: flex; gap: .5rem; margin-bottom: .8rem;">
                    <input id="word-theme" class="theme-input" type="text"
                        placeholder="e.g. animals, countries, movies…" value="general knowledge" style="flex: 1;" />
                    <input id="word-count" class="theme-input" type="number" min="5" max="100" value="20"
                        style="width: 65px; padding: .6rem .4rem; text-align: center;" title="Number of words" />
                </div>
                <button id="btn-generate" class="btn-accent">
                    <span class="btn-icon">✨</span>
                    <span class="btn-text">Generate Words with AI</span>
                </button>
                <p id="generate-status" class="generate-status"></p>
            </div>

            <div class="divider"><span>or</span></div>
            <a href="index.html" class="btn-secondary" style="text-decoration:none;">🏠 Main Menu</a>
        </div>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div id="screen-game" class="screen">
        <div class="game-layout">
            <!-- Gallows -->
            <div class="gallows-area">
                <svg id="gallows" viewBox="0 0 200 220" class="gallows-svg">
                    <!-- Structure -->
                    <line x1="20" y1="210" x2="180" y2="210" stroke="rgba(255,255,255,.3)" stroke-width="3" />
                    <line x1="60" y1="210" x2="60" y2="20" stroke="rgba(255,255,255,.3)" stroke-width="3" />
                    <line x1="60" y1="20" x2="140" y2="20" stroke="rgba(255,255,255,.3)" stroke-width="3" />
                    <line x1="140" y1="20" x2="140" y2="45" stroke="rgba(255,255,255,.3)" stroke-width="3" />
                    <!-- Body parts (hidden by default) -->
                    <circle id="hm-head" cx="140" cy="60" r="15" fill="none" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                    <line id="hm-body" x1="140" y1="75" x2="140" y2="130" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                    <line id="hm-larm" x1="140" y1="90" x2="115" y2="115" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                    <line id="hm-rarm" x1="140" y1="90" x2="165" y2="115" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                    <line id="hm-lleg" x1="140" y1="130" x2="115" y2="165" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                    <line id="hm-rleg" x1="140" y1="130" x2="165" y2="165" stroke="#a855f7" stroke-width="3"
                        class="hm-part" />
                </svg>
            </div>

            <!-- Word display -->
            <div class="word-display" id="word-display"></div>

            <!-- Category hint -->
            <p class="category-hint" id="category-hint"></p>

            <!-- Keyboard -->
            <div class="keyboard" id="keyboard"></div>

            <a href="index.html" class="btn-secondary btn-ingame-menu"
                style="text-decoration:none;margin-top:.5rem;font-size:.8rem;padding:.45rem 1.2rem;">🏠 Main Menu</a>

            <!-- Game over overlay (hidden) -->
            <div class="game-over-overlay" id="game-over" style="display:none;">
                <div class="glass-card game-over-card">
                    <span class="game-over-icon" id="game-over-icon"></span>
                    <h2 id="game-over-title"></h2>
                    <p class="game-over-word">The word was: <strong id="game-over-word"></strong></p>
                    <div class="game-over-actions">
                        <button id="btn-play-again" class="btn-primary">Play Again</button>
                        <a href="index.html" class="btn-secondary" style="text-decoration:none;">🏠 Main Menu</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="hangman.js"></script>
</body>

</html>
